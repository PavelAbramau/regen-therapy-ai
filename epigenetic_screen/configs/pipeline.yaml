random_seed: 42
n_jobs: 1

targets:
  - hdac2
  - ezh2
  - brd4

paths:
  input_path: data/raw/compounds.smi
  output_root: output
  receptor_dir: data/receptors
  target_configs_dir: configs/targets

lipinski:
  soft_violation_max: 1
  drop_failures: false

admet:
  featurizer: molgraphconv
  use_mock_models: true
  endpoints:
    - solubility
    - permeability
    - cyp_risk
    - herg_risk
    - clearance
    - toxicity

docking:
  use_mock_if_unavailable: true
  random_seed: 42

ranking:
  descriptor_terms:
    mw: -0.001
    logp: -0.05
    tpsa: -0.002
  admet_terms:
    solubility: 0.4
    permeability: 0.3
    cyp_risk: -0.2
    herg_risk: -0.3
    clearance: 0.2
    toxicity: -0.5
  docking_weight: 1.0
  shortlist_top_n: 100
